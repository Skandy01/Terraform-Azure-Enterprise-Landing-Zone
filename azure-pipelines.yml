trigger: none

stages: 

- stage: Build
  displayName: Terraform_Infra_Build
  pool: 
  
  jobs:

  - job: Terraform_Installer
    displayName: "Terraform Install"

    steps: 
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

  - job: Terraform_Initialization
    displayName: "Terraform Init-Validate"
    steps:
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'ADO'
        backendAzureRmResourceGroupName: 'RG'
        backendAzureRmStorageAccountName: 'persistentstate'
        backendAzureRmContainerName: 'infra-state'
        backendAzureRmKey: 'terraform.tfstate'
    
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'validate'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'custom'
        outputTo: 'console'
        customCommand: 'fmt'
        environmentServiceNameAzureRM: 'ADO'
    
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'ADO'

- stage: Static_Iac_Scan
  displayName: Code_Scan

  jobs:
  - job: CheckOv
  - job: TFSec
    steps:
    - task: tfsec@1
      inputs:
        version: 'v1.26.0'
        dir: '$(System.DefaultWorkingDirectory)/Workspace/Env_Dev'
      
    
    

- stage:
  
  jobs:
  - job:

- stage:
  jobs:

  - job:

  - job:

