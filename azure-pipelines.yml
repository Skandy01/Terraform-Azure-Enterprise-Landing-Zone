trigger:
  - feature/*
  - main

pr:
  branches:
    include:
      - main

pool: 'Self_Hosted_Pool'

variables: 
  workDir: '$(System.DefaultWorkingDirectory)/Workspace/Env_Dev'

parameters:
  - name: runApply
    displayName: "Do you want to Run Apply?"
    type: boolean
    default: false

stages:

- stage: Build

  displayName: Terraform_Infra_Build
  
  jobs:

  - job: Terraform_Installer

    displayName: "Terraform Install"

    steps: 
    - task: TerraformInstaller@1
      displayName: "Terraform Installer"
      inputs:
        terraformVersion: '1.7.5'

  - job: Terraform_Initialization
    dependsOn: Terraform_Installer

    displayName: "Terraform Init, Validate, Plan"

    steps:
    - task: TerraformInstaller@1
      displayName: "Terraform Installer"
      inputs:
        terraformVersion: '1.7.5'

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'ADO'
        workingDirectory: '$(workDir)'
        backendAzureRmResourceGroupName: 'RG'
        backendAzureRmStorageAccountName: 'persistentstate'
        backendAzureRmContainerName: 'infra-state'
        backendAzureRmKey: 'terraform.tfstate'
    
    - task: TerraformTask@5
      displayName: "Terraform Validate"
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(workDir)'

    - task: TerraformTask@5
      displayName: "Terraform fmt"
      inputs:
        provider: 'azurerm'
        command: 'custom'
        outputTo: 'console'
        customCommand: 'fmt'
        environmentServiceNameAzureRM: 'ADO'
        workingDirectory: '$(workDir)'
    
    - task: TerraformTask@5
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'ADO'
        commandOptions: '-out=tfplan'
        workingDirectory: '$(workDir)'

    - publish: '$(System.DefaultWorkingDirectory)/Workspace/Env_Dev/tfplan'
      artifact: terraform_plan

- stage: Iac_Security_Scan
  displayName: "IaC Security Scan"

  jobs:
  - job: TFLint_Scan
    displayName: "TFLint - Terraform Linting"
    steps:
    - script: |
        # Install TFLint
        curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
        tflint --init
        echo "=== Running TFLint ==="
        tflint $(workDir)
      displayName: "Run TFLint"
      continueOnError: true

  - job: TFSec
    displayName: "TFSec Scan"
    steps:
    - task: tfsec@1
      inputs:
        version: 'v1.26.0'
        dir: '$(workDir)'
      continueOnError: true

  - job: CheckOv_Scan
    displayName: "CheckOv - Security Scanning"
    steps:
    - script: |
        # Install CheckOv
        pip3 install checkov
        echo "=== Running CheckOv ==="
        checkov -d $(workDir) --soft-fail
      displayName: "Run CheckOv"
      continueOnError: true
    
  - job: Terrascan_Scan
    displayName: "Terrascan - Policy Compliance"
    steps:
    - script: |
        # Install Terrascan
        curl -L https://github.com/tenable/terrascan/releases/latest/download/terrascan_$(uname -s)_x86_64.tar.gz -o terrascan.tar.gz
        tar -xf terrascan.tar.gz
        chmod +x terrascan
        echo "=== Running Terrascan ==="
        ./terrascan scan -d $(workDir) -i terraform
      displayName: "Run Terrascan"
      continueOnError: true

  - job: TruffleHog_Scan
    displayName: "TruffleHog - Secrets Detection"
    steps:
    - script: |
        # Install TruffleHog
        pip3 install truffleHog
        echo "=== Running TruffleHog ==="
        trufflehog filesystem --directory=$(workDir) --no-verification
      displayName: "Run TruffleHog"
      continueOnError: true

- stage: Deployment
  displayName: "Infra_Deployment"
  dependsOn: Build

  condition: >-
    and(
      eq(variables['Build.SourceBranch'], 'refs/heads/main'),
      eq(variables['Build.Reason'], 'IndividualCI'),
      eq('${{ parameters.runApply }}', 'true')
    )

  jobs:

  - job: Manual_Validation
    displayName: "Manual_Aprroval"
    timeoutInMinutes: 4320

    pool: server

    steps:
    - task: ManualValidation@1
      displayName: "Manual Validation"
      inputs:
        notifyUsers: 'devopscollab101@gmail.com'
        approvers: 'devopscollab101@gmail.com'
        instructions: 'Please review the Terraform plan and approve deployment to Dev environment.'
        onTimeout: 'reject'

  - job: Infra_Deployment
    displayName: "Apply Terraform Changes"
    dependsOn: Manual_Validation

    steps:
    - task: TerraformInstaller@1
      displayName: "Terraform Installer"
      inputs:
        terraformVersion: '1.7.5'
    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workDir)'
        backendServiceArm: 'ADO'
        backendAzureRmResourceGroupName: 'RG'
        backendAzureRmStorageAccountName: 'persistentstate'
        backendAzureRmContainerName: 'infra-state'
        backendAzureRmKey: 'terraform.tfstate'
    
    - download: current
      artifact: terraform_plan
      patterns: '**/tfplan'

    - task: TerraformTask@5
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(workDir)'
        backendServiceArm: 'ADO'
        commandOptions: '$(Pipeline.Workspace)/terraform_plan/tfplan'