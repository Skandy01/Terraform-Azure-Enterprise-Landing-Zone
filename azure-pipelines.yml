trigger:
  branches:
    include:
      - main
      - feature/*
      - develop/*

pool: Terraform-Infra-Agent-Pool

parameters:
- name: runApply
  displayName: 'Terraform apply chalana hai?'
  type: boolean
  default: false

- name: runScanning
  displayName: 'Code ki Scanning krwani hai?'  
  type: boolean
  default: false


variables:
  workingDir: '$(System.DefaultWorkingDirectory)/Workspace/Env_Dev'
  wif: 'Workload_Identity_Federation'


stages: 

- stage: Build
  displayName: Terraform_Infra_Build
  pool: Terraform-Infra-Agent-Pool
  
  jobs:

  - job: Terraform_Installer
    displayName: "Terraform Install"

    steps: 
    - task: TerraformInstaller@1
      displayName: Terraform Install
      inputs:
        terraformVersion: 'latest'

  - job: Terraform_Initialization
    displayName: "Terraform Init-Validate-Plan"

    steps: 
    - task: TerraformInstaller@1
      displayName: Terraform Install
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: Terraform init
      inputs:

        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDir)'
        backendServiceArm: '$(wif)'
        backendAzureRmOverrideSubscriptionID: '22135bdc-d3fd-4095-9a18-2094dab79b13'
        backendAzureRmResourceGroupName: 'rg_piepline'
        backendAzureRmStorageAccountName: 'stgpipeline'
        backendAzureRmContainerName: 'PipelineCont'
        backendAzureRmKey: 'dev.terraform.tfstate'
  

    - task: TerraformTask@5
      displayName: 'Terraform fmt'
      inputs:
        provider: 'azurerm'
        command: 'custom'
        workingDirectory: '$(workingDir)'
        outputTo: 'console'
        customCommand: 'fmt'
        environmentServiceNameAzureRM: '$(wif)'    
        

    - task: TerraformTask@5
      displayName: Terraform validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(workingDir)'

    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(workingDir)'
        environmentServiceNameAzureRM: '$(wif)'
        commandOptions: '-out=tfplan'

    # - task: PublishPipelineArtifact@1
    #   displayName: 'Publish Terraform Plan as Artifact'
    #   inputs:
    #     targetPath: '$(workingDir)'
    #     artifact: 'TerraformPlan'
    #     publishLocation: 'pipeline'
    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(Pipeline.Workspace)'
        artifact: 'TerraformPlan'
        publishLocation: 'pipeline'

    - task: TerraformTask@5
      displayName: Terraform Show
      inputs:
        provider: 'azurerm'
        command: 'show'
        workingDirectory: '$(workingDir)'
        outputTo: 'console'
        outputFormat: 'default'
        environmentServiceNameAzureRM: '$(wif)'
    

- stage: Terraform_Scanning
  displayName: Scanning_Code
  dependsOn: Build
  pool: Terraform-Infra-Agent-Pool
  condition: and(succeeded(), eq('${{ parameters.runScanning }}', true))
  
  jobs:
  - job: Scanning_Terraform_Code
    displayName: Terraform Code Scanning Tools

    steps:
    - task: PowerShell@2
      displayName: Run Tflint
      continueOnError: true  # Continue even if Tflint fails
      inputs:
        targetType: 'inline'
        script: |
          try {
              Set-Location "$(System.DefaultWorkingDirectory)/Workspace/Env_Dev"

              # Check for Terraform files first
              $tfFiles = Get-ChildItem -Filter "*.tf"
              if (-not $tfFiles) {
                  Write-Host "No Terraform files found to lint. Skipping TFLint."
                  exit 0
              }

              Write-Host "Found $($tfFiles.Count) Terraform files to lint"

              # Install TFLint if not present
              if (-not (Get-Command tflint -ErrorAction SilentlyContinue)) {
                  Write-Host "Downloading TFLint..."
                  $tflintDir = "$(System.DefaultWorkingDirectory)/tflint"
                  New-Item -ItemType Directory -Path $tflintDir -Force

                  Invoke-WebRequest -Uri "https://github.com/terraform-linters/tflint/releases/download/v0.58.0/tflint_windows_amd64.zip" -OutFile "$tflintDir/tflint.zip"
                  Expand-Archive -Path "$tflintDir/tflint.zip" -DestinationPath $tflintDir -Force

                  # Update PATH only for current task
                  $env:PATH = "$tflintDir;$env:PATH"
              }

              # Verify binary path
              Write-Host "TFLint Path: $(Get-Command tflint).Source"

              Write-Host "TFLint version:"
              tflint --version

              Write-Host "Initializing TFLint plugins..."
              tflint --init

              Write-Host "Running TFLint..."
              tflint --format json | Out-File -FilePath "tflint-report.json" -Encoding UTF8

              if (Test-Path "tflint-report.json") {
                  Write-Host "TFLint completed successfully! Report generated."
              } else {
                  Write-Host "TFLint completed but no report generated."
              }
          }
          catch {
              Write-Host "##vso[task.logissue type=warning]TFLint failed: $($_.Exception.Message)"
              Write-Host "Continuing with other scans..."
          }
    
    - task: PublishPipelineArtifact@1
      displayName: 'Publish Tflint Report'
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/Workspace/Env_Dev'
        artifact: 'TflintReport'
        publishLocation: 'pipeline'
      condition: succeededOrFailed()
    
    - task: tfsec@1
      displayName: Run Tfsec
      continueOnError: true  # Continue even if Tfsec fails
      inputs:
        version: 'v1.26.0'
        debug: true
        publishTestResults: true   
        dir: '$(workingDir)'
    
    - task: PublishPipelineArtifact@1
      displayName: 'Publish Tfsec Report'
      inputs:
        targetPath: '$(workingDir)'
        artifact: 'TfsecReport'
        publishLocation: 'pipeline'
      condition: succeededOrFailed()
    
    - task: PowerShell@2
      displayName: Run Terrascan
      continueOnError: true
      inputs:
        targetType: 'inline'
        script: |
          $workingDir = "$(System.DefaultWorkingDirectory)/Workspace/Env_Dev"
          Set-Location $workingDir
          
          # Purani report delete karo
          Remove-Item "terrascan-report.json" -ErrorAction SilentlyContinue
          
          try {
              # Install Terrascan
              $terrascanExe = "$workingDir\terrascan.exe"
              if (-not (Test-Path $terrascanExe)) {
                  Write-Host "Downloading Terrascan..."
                  $url = "https://github.com/tenable/terrascan/releases/download/v1.19.9/terrascan_1.19.9_Windows_x86_64.zip"
                  Invoke-WebRequest -Uri $url -OutFile "$workingDir\terrascan.zip"
                  Expand-Archive -Path "$workingDir\terrascan.zip" -DestinationPath $workingDir -Force
                  Remove-Item "$workingDir\terrascan.zip" -Force
              }
              
              # Terrascan run karo
              Write-Host "Running Terrascan..."
              & "$terrascanExe" scan -d . --iac-type terraform -o json --output-file "terrascan-report.json"
              
              # Exit code check
              if ($LASTEXITCODE -eq 1) {
                  Write-Host "Terrascan found violations (exit code 1) - This is expected"
              }
          }
          catch {
              Write-Host "##vso[task.logissue type=warning]Terrascan error: $_"
          }
          finally {
              # Report file ensure karo
              if (-not (Test-Path "terrascan-report.json")) {
                  "{}" | Out-File "terrascan-report.json" -Encoding UTF8
              }
              Write-Host "Terrascan task completed"
          }
    
    - task: PublishPipelineArtifact@1
      displayName: Publish Terrascan Report
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/Workspace/Env_Dev/terrascan-report.json'
        artifact: TerrascanReport
        publishLocation: pipeline
    
    
    - task: PowerShell@2
      displayName: Run Checkov
      continueOnError: true
      inputs:
        targetType: inline
        script: |
          Set-Location "$(System.DefaultWorkingDirectory)/Workspace/Env_Dev"

          # Step 1: Install Latest Python 3.14.2 if not present
          if (-not (Get-Command python -ErrorAction SilentlyContinue)) {
              Write-Host "Installing Python 3.14.2 (latest stable)..."
              $pythonUrl = "https://www.python.org/ftp/python/3.14.2/python-3.14.2-amd64.exe"
              Invoke-WebRequest -Uri $pythonUrl -OutFile "python-installer.exe" -UseBasicParsing
              
              # Silent install: All users, prepend to PATH
              Start-Process -FilePath "python-installer.exe" -ArgumentList "/quiet InstallAllUsers=1 PrependPath=1" -Wait -NoNewWindow
              Remove-Item "python-installer.exe" -Force
              
              # Refresh environment variables (critical step)
              $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH", "User")
              refreshenv  # If Chocolatey is available, else skip
          }

          Write-Host "Python version: $(python --version)"

          # Step 2: Install/Upgrade Checkov
          Write-Host "Installing Checkov via pip..."
          python -m pip install --upgrade pip
          python -m pip install --upgrade checkov==3.2.5  # Latest stable as of Dec 2025

          # Step 3: Run Checkov scan
          Write-Host "Running Checkov on Terraform files..."
          checkov -d . --framework terraform --compact --skip-download -o json --output-file checkov-report.json

          # Step 4: Ensure report exists (even if zero issues)
          if (-not (Test-Path "checkov-report.json") -or ((Get-Item "checkov-report.json").Length -eq 0)) {
              Write-Host "Creating fallback empty report"
              $emptyReport = @{
                  results = @{ failed_checks = @(); passed_checks = @() };
                  summary = @{ failed = 0; passed = 0; skipped = 0; parsing_errors = 0 }
              } | ConvertTo-Json -Depth 5
              $emptyReport | Out-File -FilePath "checkov-report.json" -Encoding UTF8
          }

          $reportSize = (Get-Item "checkov-report.json").Length
          Write-Host "Checkov report ready! Size: $reportSize bytes"

          Write-Host "=== Checkov Preview ==="
          Get-Content "checkov-report.json" | Select-Object -First 15

          exit 0

    - task: PublishPipelineArtifact@1
      displayName: Publish Checkov Report
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/Workspace/Env_Dev/checkov-report.json'
        artifact: CheckovReport
        publishLocation: pipeline

    - task: PowerShell@2
      displayName: Run KICS
      continueOnError: true  # Continue even if KICS fails
      inputs:
        targetType: 'inline'
        script: |
          try {
              Set-Location "$(workingDir)"

              if (-not (Get-Command kics -ErrorAction SilentlyContinue)) {
                  Write-Host "Installing KICS..."
                  Invoke-WebRequest -Uri "https://github.com/Checkmarx/kics/releases/download/v1.8.0/kics_1.8.0_windows_amd64.zip" -OutFile "kics.zip"
                  Expand-Archive -Path "kics.zip" -DestinationPath "$(System.DefaultWorkingDirectory)/kics"
                  $env:Path += ";$(System.DefaultWorkingDirectory)/kics"
              }

              kics scan -p . -o json -r kics-report.json
              
              if (Test-Path "kics-report.json") {
                  Get-Content kics-report.json
              }
          }
          catch {
              Write-Host "##vso[task.logissue type=warning]KICS failed: $($_.Exception.Message)"
              Write-Host "Continuing with other scans..."
              
              # Create empty report so artifact publishing doesn't fail
              "{}" | Out-File -FilePath "kics-report.json" -Encoding UTF8
          }
    
    - task: PublishPipelineArtifact@1
      displayName: 'Publish KICS Report'
      inputs:
        targetPath: '$(workingDir)'
        artifact: 'KICSReport'
        publishLocation: 'pipeline'
      condition: succeededOrFailed()

- stage: Manual_Approval

  displayName: Manual_Approval
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq('${{ parameters.runScanning }}', true))
  
  jobs:

  - job: manual_approval
    displayName: Manual Approval Krdo Apply ke liye
    pool: server

    steps:
    - task: ManualValidation@1
      inputs:
        notifyUsers: 'devopscollab101@gmail.com'
        approvers: 'devopscollab101@gmail.com'
        instructions: Plan check karlo Bhaiya...!


- stage: Deploy

  displayName: Terraform Init & Apply 
  dependsOn: Manual_Approval
  condition: and(succeeded(), eq('${{ parameters.runApply }}', true))
  pool: Terraform-Infra-Agent-Pool

  jobs: 

  - job: approve_before_apply
    displayName: "Approval Before Apply"
    pool: server
    
    steps:
      - task: ManualValidation@1
        inputs:
          notifyUsers: 'devopscollab101@gmail.com'
          instructions: 'Plan review ho gaya? Final apply approve karo!'

  - job: Terraform_Init_to_Apply
    displayName: Terraform Infra Deployment
    dependsOn: approve_before_apply

    steps:

    - task: DownloadPipelineArtifact@2
      displayName: 'Download Terraform Plan Artifact'
      inputs:
        buildType: 'current'
        artifactName: 'TerraformPlan'
        targetPath: '$(workingDir)'
      condition: succeeded()

    - task: TerraformTask@5
      displayName: Terraform init
      inputs:

        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDir)'
        backendServiceArm: '$(wif)'
        backendAzureRmOverrideSubscriptionID: '22135bdc-d3fd-4095-9a18-2094dab79b13'
        backendAzureRmResourceGroupName: 'rg_piepline'
        backendAzureRmStorageAccountName: 'stgpipeline'
        backendAzureRmContainerName: 'PipelineCont'
        backendAzureRmKey: 'dev.terraform.tfstate'

    - task: TerraformTask@5
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(workingDir)'
        environmentServiceNameAzureRM: '$(wif)'

